apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    field.cattle.io/creatorId: cwolsen
  labels:
    cattle.io/creator: norman
    workload.user.cattle.io/workloadselector: deployment-webservices-staging-affiliate-api
  name: affiliate-api
  namespace: webservices-staging
  selfLink: /apis/apps/v1/namespaces/webservices-staging/deployments/affiliate-api
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: deployment-webservices-staging-affiliate-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        field.cattle.io/ports: '[[{"containerPort":8080,"dnsName":"affiliate-api","hostPort":0,"kind":"ClusterIP","name":"8080tcp02","protocol":"TCP","sourcePort":0}]]'
        date: "{{DATE_STAMP}}"
      creationTimestamp: null
      labels:
        workload.user.cattle.io/workloadselector: deployment-webservices-staging-affiliate-api
    spec:
      containers:
      - env:
        - name: IN_DEV
          value: "0"
        - name: ENV
          value: "STAGING"
        - name: APP_NAME
          value: "AffiliateApi"
        image: registry.lan.vsmedia.net/vsm-labs/project-neptune:staging
        imagePullPolicy: Always
        name: affiliate-api
        ports:
        - containerPort: 8080
          name: 8080tcp02
          protocol: TCP
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {}
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        volumeMounts:
        - mountPath: /mnt/vol-default-flat
          name: vol-default-flat
          readOnly: true
        - mountPath: /logs
          name: logs
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: vsm-gitlab
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /code/vol-default-flat/dev
          type: ""
        name: vol-default-flat
      - hostPath:
          path: /logs
          type: DirectoryOrCreate
        name: logs
