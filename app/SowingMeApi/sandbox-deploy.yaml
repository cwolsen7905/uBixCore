apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    field.cattle.io/creatorId: cwolsen
  labels:
    project-neptune: affiliate-api
  name: affiliate-api
  namespace: webservices-sandbox
  selfLink: /apis/apps/v1/namespaces/webservices-sandbox/deployments/affiliate-api
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: deployment-webservices-sandbox-affiliate-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        field.cattle.io/ports: '[[{"containerPort":80,"dnsName":"affiliate-api","hostPort":0,"kind":"ClusterIP","name":"80tcp02","protocol":"TCP","sourcePort":0}]]'
        date: "{{DATE_STAMP}}"
      creationTimestamp: null
      labels:
        workload.user.cattle.io/workloadselector: deployment-webservices-sandbox-affiliate-api
    spec:
      containers:
      - env:
        - name: IN_DEV
          value: "1"
        - name: ENV
          value: "DEV"
        - name: APP_NAME
          value: "AffiliateApi"
        image: project-neptune:sandbox
        imagePullPolicy: Never
        name: affiliate-api
        ports:
        - containerPort: 80
          name: 80tcp02
          protocol: TCP
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {}
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        volumeMounts:
        - mountPath: /mnt/project-neptune
          name: project-neptune
          readOnly: false
        - mountPath: /logs
          name: logs
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: vsm-gitlab
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /code/project-neptune
          type: ""
        name: project-neptune
      - hostPath:
          path: /logs
          type: DirectoryOrCreate
        name: logs
