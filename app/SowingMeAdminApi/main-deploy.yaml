apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    field.cattle.io/creatorId: cwolsen
  labels:
    cattle.io/creator: norman
    workload.user.cattle.io/workloadselector: deployment-ws-prod-sowing-me-admin-api
  name: sowing-me-admin-api
  namespace: ws-prod
  selfLink: /apis/apps/v1/namespaces/ws-prod/deployments/sowing-me-admin-api
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: deployment-ws-prod-sowing-me-admin-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        field.cattle.io/ports: '[[{"containerPort":8080,"dnsName":"sowing-me-admin-api","hostPort":0,"kind":"ClusterIP","name":"8080tcp02","protocol":"TCP","sourcePort":0}]]'
        date: "{{DATE_STAMP}}"
      creationTimestamp: null
      labels:
        workload.user.cattle.io/workloadselector: deployment-ws-prod-sowing-me-admin-api
    spec:
      containers:
      - env:
        - name: IN_DEV
          value: "0"
        - name: ENV
          value: "PROD"
        - name: APP_NAME
          value: "SowingMeAdminApi"
        image: gitlab.brainchurts.com:5050/ubixsys/ubixcore:main
        imagePullPolicy: Always
        name: sowing-me-admin-api
        ports:
        - containerPort: 8080
          name: 8080tcp02
          protocol: TCP
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {}
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        volumeMounts:
        - mountPath: /logs
          name: logs
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: regcred
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /logs
          type: DirectoryOrCreate
        name: logs
