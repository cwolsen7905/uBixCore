before_script:
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

stages:
  - test
  - build
  - deploy
  
deploy-composer:
  stage: deploy
  tags:
  - shell
  script:
  - '/usr/bin/curl --header "Job-Token: $CI_JOB_TOKEN" --data tag=$CI_COMMIT_TAG "${CI_API_V4_URL}/projects/$CI_PROJECT_ID/packages/composer"'
  only:
  - tags

build-dev:
  tags:
  - shell
  stage: build
  script:
  - docker buildx build --platform linux/amd64,linux/arm64 --push -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" .
  - docker buildx build --platform linux/amd64,linux/arm64 --push -t "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}-node" . -f Dockerfile_Node_${CI_COMMIT_REF_SLUG^}
  only:
    - dev

deploy-dev:
  stage: deploy
  tags:
  - shell
  script:
  - bash bin/deploy.sh $CI_COMMIT_REF_SLUG
  only:
  - dev

build-staging:
  tags:
  - shell
  stage: build
  script:
  - docker buildx build --platform linux/amd64,linux/arm64 --push -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" -f Dockerfile_${CI_COMMIT_REF_SLUG^} .
  - docker buildx build --platform linux/amd64,linux/arm64 --push -t "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}-node" . -f Dockerfile_Node_${CI_COMMIT_REF_SLUG^}
  only:
  - staging

deploy-staging:
  stage: deploy
  tags:
  - shell
  script:
  - bash bin/deploy.sh $CI_COMMIT_REF_SLUG
  only:
  - staging

build-main:
  tags:
  - shell
  stage: build
  script:
  - docker buildx build --platform linux/amd64,linux/arm64 --push -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" -f Dockerfile_${CI_COMMIT_REF_SLUG^} .
  - docker buildx build --platform linux/amd64,linux/arm64 --push -t "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}-node" . -f Dockerfile_Node_${CI_COMMIT_REF_SLUG^}
  only:
    - main
    - master

deploy-main:
  stage: deploy
  tags:
  - shell
  script:
  - bash bin/deploy.sh $CI_COMMIT_REF_SLUG
  only:
  - main
  - master
